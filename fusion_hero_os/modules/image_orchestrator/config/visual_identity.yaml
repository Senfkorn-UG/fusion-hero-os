# Visual Identity / Character Bible — Daten, nicht in Code eingebacken.
# Quelle: BuilderProfile Bildgenerierungs-Pipeline (Archiv-PDFs, 2026)

identity:
  name: "BuilderProfile"
  primary_seed: "95g_Hacker_PrimarySeed_2026-07-04"
  style_tags:
    - cyberpunk
    - campfire
    - meme-theory
  palette:
    primary: "#00ff9f"
    accent: "#ff3366"
    background: "#0a0a12"

rate_limits:
  default:
    max_requests: 8
    window_seconds: 60.0
  burst:
    max_requests: 3
    window_seconds: 10.0

character_bible:
  constraints:
    - "Keine hardcodierten Personen ohne Consent"
    - "Meme-Theory-Tags aus style_tags ableiten"
    - "primary_seed für Konsistenz über Sessions"

pipeline:
  mode: dry_run
  stages:
    - validate_identity
    - rate_limit
    - build_prompt
    - render
  note: "Echte Provider-Aufrufe erfordern explizites User-Opt-in (connectors-Pattern)."