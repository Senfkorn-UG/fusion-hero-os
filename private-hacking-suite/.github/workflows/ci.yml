name: CI

on:
  push:
    branches: [main]
  pull_request:

# Laufende Runs bei neuem Push auf denselben Ref abbrechen.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      # Nur kritische Regeln (Syntax-/Logikfehler), kein Stil-Gate — soll auf
      # dem Bestandscode grün sein, aber echte Brüche fangen.
      - name: Lint (kritisch)
        run: ruff check --select=E9,F63,F7,F82 .

      - name: Run tests
        run: pytest
