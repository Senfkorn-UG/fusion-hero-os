# Control instances — each model forces highest accuracy
# Policy: pseudo_inhouse_only · freemium=false · multi-model control

version: "1.0"
platform_version: "10.0.0"
principle: >
  Independent control instances run on different models. Each instance is forced
  to maximum accuracy (temperature=0, verifier protocol, structured JSON score).
  Consensus / disagreement is recorded; no single model is source-of-truth alone.

accuracy_force:
  temperature: 0.0
  top_p: 1.0
  role: verifier
  require_json_score: true
  max_tokens: 2048
  timeout_sec: 120

# Control instances (order = report order). Only live/configured providers run.
instances:
  - id: control_grok
    provider: grok
    label: "Grok (xAI) control"
    accuracy: max
  - id: control_claude
    provider: claude
    label: "Claude control"
    accuracy: max
  - id: control_gpt
    provider: gpt
    label: "GPT control"
    accuracy: max
  - id: control_gemini
    provider: gemini
    label: "Gemini control"
    accuracy: max
  - id: control_groq
    provider: groq
    label: "Groq control"
    accuracy: max
  - id: control_openrouter
    provider: openrouter
    label: "OpenRouter control"
    accuracy: max
  - id: control_ollama
    provider: ollama
    label: "Ollama local control"
    accuracy: max
  - id: control_internal
    provider: internal
    label: "Internal heroic control (always)"
    accuracy: max
    always: true

consensus:
  min_instances: 1
  # scores 0-100 from each instance; agreement if answer hashes match or score band tight
  score_band: 15
