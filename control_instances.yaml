# Control instances — each model forces highest accuracy
# Policy: pseudo_inhouse_only · freemium=false · multi-model control
# Gemini + further providers: multi-slots analog (temp=0, verifier JSON)

version: "1.2"
platform_version: "12.0.0"
principle: >
  Independent control instances run on different models. Each instance is forced
  to maximum accuracy (temperature=0, verifier protocol, structured JSON score).
  Consensus / disagreement is recorded; no single model is source-of-truth alone.
  Gemini and all listed providers share the same accuracy-force contract with
  multi-slot model_override variants (analog pattern).

accuracy_force:
  temperature: 0.0
  top_p: 1.0
  role: verifier
  require_json_score: true
  max_tokens: 2048
  timeout_sec: 120

# dotenv: load operator keys without logging values
secret_load:
  enabled: true
  dotenv_paths:
    - .env
    - .env.local
    - ~/.fusion/secrets/push.env

# Control instances (order = report order). Only live/configured providers run.
# Multi-slots: same provider + different model_override (Gemini pattern, analog).
instances:
  # --- Google Gemini (multi-slot) ---
  - id: control_gemini
    provider: gemini
    label: "Gemini control (default / FUSION_GEMINI_MODEL)"
    accuracy: max
    model_env: FUSION_GEMINI_MODEL
  - id: control_gemini_flash
    provider: gemini
    label: "Gemini 2.0 Flash control"
    accuracy: max
    model_override: gemini-2.0-flash
  - id: control_gemini_flash_lite
    provider: gemini
    label: "Gemini 2.0 Flash-Lite control"
    accuracy: max
    model_override: gemini-2.0-flash-lite
  - id: control_gemini_15_pro
    provider: gemini
    label: "Gemini 1.5 Pro control"
    accuracy: max
    model_override: gemini-1.5-pro
  - id: control_gemini_15_flash
    provider: gemini
    label: "Gemini 1.5 Flash control"
    accuracy: max
    model_override: gemini-1.5-flash
  - id: control_gemini_25_flash
    provider: gemini
    label: "Gemini 2.5 Flash control"
    accuracy: max
    model_override: gemini-2.5-flash
  - id: control_gemini_25_pro
    provider: gemini
    label: "Gemini 2.5 Pro control"
    accuracy: max
    model_override: gemini-2.5-pro

  # --- Grok / xAI (multi-slot, analog) ---
  - id: control_grok
