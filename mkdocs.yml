site_name: Fusion Hero OS v10.0.0
site_description: Operational platform — ALTE_Frau_95g Heroic Core · Poly-Mesh · Stage-A/B
site_author: 95guknow
site_url: https://95guknow.github.io/fusion-hero-os/
repo_url: https://github.com/95guknow/fusion-hero-os
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    scheme: slate
    primary: deep purple
    accent: cyan
  features:
    - navigation.tabs
    - navigation.top
    - navigation.tracking
    - search.suggest
    - search.highlight
    - content.code.copy

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true

nav:
  - Home: index.md
  - Monorepo Architektur: monorepo-structure.md
  - CI/CD Roadmap: workflow-roadmap.md