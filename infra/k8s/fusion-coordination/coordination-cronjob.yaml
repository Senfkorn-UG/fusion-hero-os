# Periodic coordination on GKE Autopilot — uses cluster CPU for inventory/plan cycles.
# Prerequisites:
#   - GCS bucket with coordination prefix (see mesh_service_coordination.yaml)
#   - Workload Identity / SA with objectAdmin on that bucket (reuse fusion-training-sa or dedicated)
#   - ConfigMap/script image that includes mesh_cluster_coordinator.py + catalog YAML
#
# Apply (after image is built/pushed):
#   kubectl apply -f namespace.yaml
#   kubectl apply -f coordination-cronjob.yaml
#
# Until a dedicated image exists, run locally:
#   python scripts/mesh_cluster_coordinator.py --mode all
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: fusion-coordination-ksa
  namespace: fusion-coordination
  annotations:
    # Replace PROJECT_ID after terraform/WI binding
    iam.gke.io/gcp-service-account: fusion-training-sa@PROJECT_ID.iam.gserviceaccount.com
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: fusion-service-coordination
  namespace: fusion-coordination
  labels:
    app: fusion-coordination
    tier: L3_cluster
spec:
  schedule: "*/30 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      ttlSecondsAfterFinished: 86400
      template:
        metadata:
          labels:
            app: fusion-coordination
        spec:
          serviceAccountName: fusion-coordination-ksa
          restartPolicy: OnFailure
          containers:
            - name: coordinator
              # Placeholder image — replace with internal image shipping scripts/ + catalog
              image: python:3.11-slim
              imagePullPolicy: IfNotPresent
              command:
                - /bin/bash
                - -c
                - |
                  set -euo pipefail
                  pip install -q pyyaml google-cloud-storage
                  # Expect catalog + script mounted or fetched from GCS
                  if [[ -f /coord/scripts/mesh_cluster_coordinator.py ]]; then
                    python /coord/scripts/mesh_cluster_coordinator.py --mode all --upload-gcs \
                      --catalog /coord/mesh_service_coordination.yaml \
                      --gcs-prefix "${FUSION_COORD_GCS_PREFIX}"
                  else
                    echo "Coordinator assets not mounted; write heartbeat only"
                    python - <<'PY'
                  import json, os, time
                  from pathlib import Path
                  print(json.dumps({"ok": False, "reason": "assets_missing", "ts": time.time()}))
                  PY
                  fi
              env:
                - name: FUSION_COORD_GCS_PREFIX
                  value: gs://fusion-ai-data-PROJECT_ID/coordination
              resources:
                requests:
                  cpu: "500m"
                  memory: 512Mi
                limits:
                  cpu: "1"
                  memory: 1Gi
              volumeMounts:
                - name: coord-assets
                  mountPath: /coord
                  readOnly: true
          volumes:
            - name: coord-assets
              emptyDir: {}
              # Production: replace emptyDir with CSI GCS fuse or initContainer gsutil cp
