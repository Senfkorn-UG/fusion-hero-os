# Cloud Build — Fusion coordination image → Artifact Registry (europe-west3)
# From repo root:
#   gcloud builds submit --config=infra/k8s/fusion-coordination/cloudbuild.yaml .
#
# Substitutions:
#   _REGION, _REPO, _IMAGE (optional)

substitutions:
  _REGION: europe-west3
  _REPO: fusion-hero
  _IMAGE: coordination
  _TAG: v10.0.0

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

steps:
  - name: gcr.io/cloud-builders/docker
    id: build
    args:
      - build
      - -f
      - infra/k8s/fusion-coordination/Dockerfile
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_IMAGE}:${_TAG}
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_IMAGE}:latest
      - .

  - name: gcr.io/cloud-builders/docker
    id: push-tag
    args:
      - push
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_IMAGE}:${_TAG}

  - name: gcr.io/cloud-builders/docker
    id: push-latest
    args:
      - push
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_IMAGE}:latest

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_IMAGE}:${_TAG}
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_IMAGE}:latest

timeout: 1200s
