# Lightweight proof Job: runs ONLY on cluster (no GPU, small resources)
# Proves routing/execution is on GKE — not mainframe dual-start.
apiVersion: batch/v1
kind: Job
metadata:
  name: poly-mesh-router-proof
  namespace: fusion-coordination
  labels:
    app: poly-mesh-router-proof
    app.kubernetes.io/version: "10.0.0"
    fusion-hero-os/platform-version: "10.0.0"
    routing: cluster-only
    sole-authority: poly-mesh-router
spec:
  backoffLimit: 1
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app: poly-mesh-router-proof
    spec:
      restartPolicy: Never
      # No GPU selectors — schedule on existing Ready node
      containers:
        - name: proof
          image: busybox:1.36
          command:
            - /bin/sh
            - -c
            - |
              set -e
              echo "poly_mesh_router_proof=ok"
              echo "host=$(hostname)"
              echo "ts=$(date -Iseconds 2>/dev/null || date)"
              echo "tier=L3_cluster"
              echo "sole_authority=poly_mesh_router"
              echo "no_local_dual_start=1"
              # stay scheduled long enough for kubectl logs
              sleep 5
          resources:
            requests:
              cpu: "50m"
              memory: 64Mi
            limits:
              cpu: "200m"
              memory: 128Mi
