# Tier 1 fallback: 1x NVIDIA L4 (lower quota footprint)
apiVersion: batch/v1
kind: Job
metadata:
  name: fusion-durability-train-tier1
  namespace: fusion-training
  labels:
    app: fusion-training
    app.kubernetes.io/version: "10.0.0"
    fusion-hero-os/platform-version: "10.0.0"
    tier: tier1-l4
spec:
  backoffLimit: 2
  ttlSecondsAfterFinished: 86400
  activeDeadlineSeconds: 259200
  template:
    metadata:
      labels:
        app: fusion-training
    app.kubernetes.io/version: "10.0.0"
    fusion-hero-os/platform-version: "10.0.0"
        tier: tier1-l4
    spec:
      serviceAccountName: fusion-training-ksa
      restartPolicy: OnFailure
      terminationGracePeriodSeconds: 120
      initContainers:
        - name: fetch-training-code
          image: google/cloud-sdk:alpine
          command:
            - /bin/sh
            - -c
            - |
              set -euo pipefail
              mkdir -p /workspace/training
              gsutil -m cp -r "gs://${GCS_BUCKET}/training/*" /workspace/training/ || true
              ls -la /workspace/training
          env:
            - name: GCS_BUCKET
              value: fusion-ai-data-${GCP_PROJECT_ID}
          volumeMounts:
            - name: workspace
              mountPath: /workspace
      containers:
        - name: fusion-trainer
          image: nvcr.io/nvidia/pytorch:24.06-py3
          imagePullPolicy: IfNotPresent
          command:
            - /bin/bash
            - -c
            - |
              set -euo pipefail
              pip install -q numpy numba
              export PYTHONPATH="/workspace/training:${PYTHONPATH:-}"
              cd /workspace/training
              python3 fusion_stability_train.py
          env:
            - name: FUSION_DATA_ROOT
              value: /quantum-data
            - name: FUSION_STABILITY_WINDOW
              value: "50"
            - name: FUSION_STABILITY_EPS
              value: "1e-4"
            - name: FUSION_QUBO_N
              value: "128"
            - name: FUSION_ANNEAL_STEPS
              value: "3000"
          resources:
            requests:
              cpu: "8"
              memory: 32Gi
              ephemeral-storage: 30Gi
              nvidia.com/gpu: "1"
            limits:
              cpu: "8"
              memory: 32Gi
              ephemeral-storage: 30Gi
              nvidia.com/gpu: "1"
          volumeMounts:
            - name: gcs-fuse
              mountPath: /quantum-data
            - name: workspace
              mountPath: /workspace
      volumes:
        - name: workspace
          emptyDir: {}
        - name: gcs-fuse
          csi:
            driver: gcsfuse.csi.storage.gke.io
            volumeAttributes:
              bucketName: fusion-ai-data-${GCP_PROJECT_ID}
              mountOptions: "implicit-dirs"
      nodeSelector:
        cloud.google.com/gke-accelerator: nvidia-l4