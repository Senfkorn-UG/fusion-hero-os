# Crosspollination QUBO — BEST IN REGION europe-west3
# ============================================================================: Wichtungen / Assoziationsgewichte (cross-pollination) on L3 only
#
# BEST GPU in europe-west3 (gcloud accelerator-types): nvidia-h100-80gb
#   (A100 is NOT listed in europe-west3 — do not use nvidia-tesla-a100 here)
#
# COST (order of magnitude, Autopilot on-demand H100 ~ very high):
#   H100 class: often ~10-15+ EUR/h GPU — confirm in Cloud Billing
#   Our cost-function model a100_gpu_hour=3.90 is a lower bound; H100 is higher.
#   Budget guidance:
#     short 2h:  ~25-40 EUR
#     standard 6h: ~75-120 EUR
#     Use one-shot training budget (700 EUR), NOT the 200 EUR/month ops envelope.
#
# ALTERNATIVE "good" (budget month): 1x nvidia-l4 @ ~0.70 EUR/h model rate
#
# APPLY:
#   gsutil cp scripts/crosspollination_qubo_optimize.py qb_qubo.py \
#     gs://fusion-ai-data-project-bbf0e6db-52e1-462b-8e3/training/
#   kubectl create -f infra/k8s/fusion-training/crosspollination-qubo-best-job.yaml
#   kubectl logs -n fusion-training -l app=crosspoll-qubo -f
---
apiVersion: batch/v1
kind: Job
metadata:
  generateName: crosspoll-qubo-best-
  namespace: fusion-training
  labels:
    app: crosspoll-qubo
    app.kubernetes.io/part-of: fusion-hero-os
    app.kubernetes.io/version: "10.0.0"
    fusion-hero-os/platform-version: "10.0.0"
    fusion-hero-os/operative-kanon: v10.0.0
    tier: L3_cluster
    server-class: h100-80gb-best-in-region
    algo-class: force_cluster_compute
    workload: crosspollination-weights
    sole-authority: poly_mesh_router
    plane: hyperraum
spec:
  backoffLimit: 2
  ttlSecondsAfterFinished: 172800
  activeDeadlineSeconds: 86400
  template:
    metadata:
      labels:
        app: crosspoll-qubo
        tier: L3_cluster
        server-class: h100-80gb-best-in-region
        sole-authority: poly_mesh_router
    spec:
      serviceAccountName: fusion-training-ksa
      restartPolicy: OnFailure
      terminationGracePeriodSeconds: 120
      initContainers:
        - name: fetch-code
          image: google/cloud-sdk:alpine
          command:
            - /bin/sh
            - -c
            - |
              set -euo pipefail
              mkdir -p /workspace/training
              gsutil -m cp -r "gs://${GCS_BUCKET}/training/*" /workspace/training/ || true
              ls -la /workspace/training
              test -f /workspace/training/crosspollination_qubo_optimize.py
          env:
            - name: GCS_BUCKET
              value: fusion-ai-data-project-bbf0e6db-52e1-462b-8e3
          volumeMounts:
            - name: workspace
              mountPath: /workspace
      containers:
        - name: crosspoll-optimizer
          image: nvcr.io/nvidia/pytorch:24.06-py3
          imagePullPolicy: IfNotPresent
          command:
            - /bin/bash
            - -c
            - |
              set -euo pipefail
              pip install -q numpy numba
              export PYTHONPATH="/workspace/training:${PYTHONPATH:-}"
              cd /workspace/training
              python3 crosspollination_qubo_optimize.py
              gsutil -m cp -r /quantum-data/crosspollination/* \
                "gs://${GCS_BUCKET}/crosspollination/" || true
          env:
            - name: GCS_BUCKET
              value: fusion-ai-data-project-bbf0e6db-52e1-462b-8e3
            - name: FUSION_DATA_ROOT
              value: /quantum-data
            - name: FUSION_QUBO_N
              value: "512"
            - name: FUSION_ANNEAL_STEPS
              value: "12000"
            - name: FUSION_N_RESTARTS
              value: "16"
            - name: FUSION_WEIGHT_SEED
              value: "42"
            - name: FUSION_CROSS_SOURCES
              value: "mesh,dissertation,qubo,operator,ascension,heroic"
            - name: FUSION_CARDINALITY_K
              value: "64"
            - name: FUSION_CARDINALITY_PENALTY
              value: "5.0"
            - name: FUSION_HYPERTHREADING
              value: "1"
            - name: FUSION_SERVER_CLASS
              value: "h100-80gb-best-in-region-europe-west3"
            - name: FUSION_PLATFORM_VERSION
              value: "10.0.0"
            - name: FUSION_NO_LOCAL_DUAL_START
              value: "1"
            - name: FUSION_POLY_MESH_TIER
              value: "L3_cluster"
          resources:
            requests:
              cpu: "8"
              memory: 64Gi
              ephemeral-storage: 40Gi
              nvidia.com/gpu: "1"
            limits:
              cpu: "8"
              memory: 64Gi
              ephemeral-storage: 40Gi
              nvidia.com/gpu: "1"
          volumeMounts:
            - name: workspace
              mountPath: /workspace
            - name: gcs-fuse
              mountPath: /quantum-data
      volumes:
        - name: workspace
          emptyDir: {}
        - name: gcs-fuse
          csi:
            driver: gcsfuse.csi.storage.gke.io
            volumeAttributes:
              bucketName: fusion-ai-data-project-bbf0e6db-52e1-462b-8e3
              mountOptions: "implicit-dirs"
      nodeSelector:
        # BEST available accelerator in europe-west3 (verified via gcloud)
        cloud.google.com/gke-accelerator: nvidia-h100-80gb
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
