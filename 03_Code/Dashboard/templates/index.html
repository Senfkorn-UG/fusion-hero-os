<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><title>ALTE_Frau Dashboard</title><script src="https://cdn.tailwindcss.com"></script></head><body class="bg-[#0a0a0f] text-[#e2e8f0] h-screen"><div id="app" class="p-6"><h1 class="text-2xl font-bold text-[#00d4aa] mb-4">Echtzeit-Denkprozess Monitor</h1><div class="grid grid-cols-3 gap-4"><div class="col-span-2 bg-[#1e1e2e] p-4 rounded"><canvas id="chart" class="w-full h-64"></canvas></div><div class="bg-[#1e1e2e] p-4 rounded"><h2 class="text-lg font-bold mb-2">Metriken</h2><div id="metrics" class="text-sm space-y-1"><div>CPU: <span id="cpu">--</span>%</div><div>RAM: <span id="ram">--</span>%</div><div>Events: <span id="event-count">0</span></div></div></div></div><script>const ws = new WebSocket("ws://" + location.host + "/ws"); ws.onmessage = (e) => { const data = JSON.parse(e.data); console.log("Event:", data); };</script></div></body></html>
