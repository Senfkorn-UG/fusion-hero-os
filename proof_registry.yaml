# ============================================================================
# PROOF REGISTRY — einzige autoritative Quelle fuer System-Claims
# ============================================================================
# Regel (Code-Honesty, maschinell erzwungen durch scripts/check_proof_registry.py):
#   * status: BEWIESEN  -> MUSS >=1 existierenden pytest-Knoten in proofs listen.
#                          Der Checker verifiziert die Existenz via pytest-Collection;
#                          die CI fuehrt die Suite aus -> gruen == Claim gedeckt.
#   * status: OFFEN     -> Hypothese. proofs darf leer sein. Docs duerfen den
#                          Claim NUR als offen/Hypothese zitieren.
#   * status: WIDERLEGT -> Gegenbeispiel dokumentieren (notes), proofs zeigt
#                          auf den Test, der das Gegenbeispiel verankert.
# Herkunft: Idee 4 des Repo-Sweeps 2026-07-05, formalisiert nach
# Gemini-Synthese v9 (docs/01_vision/GEMINI_SYNTHESIS_v9_REVIEW.md).
# ============================================================================
