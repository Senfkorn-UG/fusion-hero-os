<div id="task-list">
<table>
    <thead>
        <tr>
            <th>Description</th>
            <th>Priority</th>
            <th>Status</th>
            <th>Created</th>
        </tr>
    </thead>
    <tbody>
        {% for task in tasks %}
        <tr>
            <td>{{ task.description }}</td>
            <td>{{ task.priority }}</td>
            <td>
                <span class="status-{{ task.status }}">{{ task.status }}</span>
            </td>
            <td>{{ task.created_at.strftime('%Y-%m-%d %H:%M') if task.created_at else '-' }}</td>
        </tr>
        {% else %}
        <tr><td colspan="4" style="color:#64748b; text-align:center; padding:30px;">No tasks yet.</td></tr>
        {% endfor %}
    </tbody>
</table>
</div>
