name: Rust

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Build Rust prototype (alte_frau_rust)
      working-directory: 03_Code/Rust_Prototype/alte_frau_rust
      run: cargo build --verbose
    - name: Run tests for Rust prototype
      working-directory: 03_Code/Rust_Prototype/alte_frau_rust
      run: cargo test --verbose
