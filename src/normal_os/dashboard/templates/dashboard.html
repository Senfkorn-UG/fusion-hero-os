<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>{{ app_name }} Dashboard</title>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <style>
        body { font-family: system-ui; margin: 40px; }
        .task { border: 1px solid #ccc; padding: 12px; margin: 8px 0; border-radius: 6px; }
        .status-pending { background: #fefce8; }
        .status-running { background: #dbeafe; }
        .status-completed { background: #dcfce7; }
        .status-failed { background: #fee2e2; }
    </style>
</head>
<body>
    <h1>{{ app_name }} Dashboard</h1>

    <h2>Submit new Task</h2>
    <form hx-post="/tasks" hx-target="#result">
        <input type="text" name="task_type" placeholder="Task Type" required>
        <textarea name="payload" placeholder='{"key": "value"}'></textarea>
        <button type="submit">Submit Task</button>
    </form>

    <div id="result"></div>

    <h2>Recent Tasks</h2>
    <div id="tasks" hx-get="/tasks" hx-trigger="every 5s">
        {% for task in tasks %}
        <div class="task status-{{ task.status }}">
            <strong>{{ task.type }}</strong> ({{ task.id }})
            <br>Status: {{ task.status }} | Priority: {{ task.priority }}
        </div>
        {% endfor %}
    </div>

    <h2>QUBO Solver</h2>
    <form hx-post="/qubo/solve" hx-target="#qubo-result">
        <textarea name="Q" placeholder="QUBO matrix as JSON"></textarea>
        <textarea name="bias" placeholder="Bias as JSON"></textarea>
        <button type="submit">Solve QUBO</button>
    </form>
    <div id="qubo-result"></div>
</body>
</html>
