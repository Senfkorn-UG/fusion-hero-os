# Fusion Hero OS — Kanonische Tailscale-Mesh-Rollen (Single Source of Truth)
# Der Windows-Desktop ist der Mainframe (Orchestrator). Linux-Knoten ist archiviert.

mesh_roles_version: "1.1"
updated: "2026-07-12"
tailnet: example.ts.net
principle: "Windows-Desktop = Mainframe — zentraler Orchestrator im Tailscale-Mesh"

# Rolle → physischer Knoten (kanonisch)
role_assignments:
  mainframe:
    node_id: mainframe
    role: orchestrator
    hostname: mainframe-host
    magicdns: mainframe-host.example.ts.net
    platform: windows
    tailscale_tag: tag:fusion-node-mainframe
    canonical: true
    aliases: [desktop]
    services:
      - fusion-dashboard
      - hero-docs-server
      - normalos-bridge
      - tailscale-control
      - fusion-integration-hub
      - grok-cli
      - mcp-bridges
      - ollama

  workstation:
    node_id: desktop
    role: grok-workstation
    same_as: mainframe
    hostname: mainframe-host
    magicdns: mainframe-host.example.ts.net
    platform: windows
    tailscale_tag: tag:fusion-node-desktop

  mobile:
    node_id: phone
    role: mobile-client
    hostname: mobile-node
    magicdns: mobile-node.example.ts.net
    platform: android
    tailscale_tag: tag:fusion-node-phone
    login_required: user@example.com
    login_warning: "Nicht GitHub — gleicher Login wie Desktop (Google)"

  legacy:
    node_id: legacy-linux
    role: archived
    hostname: mainframe
    magicdns: mainframe-host.example.ts.net
    platform: linux
    status: offline
    tailscale_status: "offline >2d — nicht mehr im aktiven Mesh"
    note: "Frueherer Linux-Knoten — Mainframe-Rolle auf Windows-Desktop uebertragen (2026-07-12)"
    action: none

  wsl:
    node_id: wsl-ubuntu
    role: dev-leaf
    platform: linux
    hostname: wsl-ubuntu
    status: login_required
    login_required: user@example.com
    setup_script: workstation/tailscale_wsl_setup.sh
    login_url_file: "~/.fusion/tailscale-wsl-login.url"
    note: "Entwicklungs-Leaf — kein Mainframe; Tailscale optional fuer Mesh-Checks"

# Speicher — Google Drive als Standard fuer nicht-operative Daten
storage:
  policy_id: google_drive_cold_default
  policy_file: workstation/storage_policy.json
  cold_default: google_drive
  local_operational_only: true
  gdrive_cold_root: "Meine Ablage/FusionHero_Offload"
  vault_provenance: 95guknow/fusion-hero-vault
  apply_script: workstation/apply-storage-policy.ps1

# Git - bifurzierter Bottom-Up-Merge (WSL -> Windows -> GitHub)
git:
  merge_policy: bottom_up
  bottom_up_script: workstation/merge-bottom-up.ps1
  wsl_script: workstation/merge-bottom-up.sh
  status_file: "~/.fusion/merge-bottom-up.status.json"

# Routing (Funnel + MagicDNS) — zeigt auf Windows-Mainframe
routing:
  base_url: https://mainframe-host.example.ts.net
  mainframe_hostname: mainframe-host
  funnel_port: 8088
