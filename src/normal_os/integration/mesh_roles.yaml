# Fusion Hero OS — Kanonische Tailscale-Mesh-Rollen (Single Source of Truth)
# Der Windows-Desktop ist der Mainframe (Orchestrator). Linux-Knoten ist archiviert.

mesh_roles_version: "1.1"
updated: "2026-07-12"
tailnet: example.ts.net
principle: "Windows-Desktop = Mainframe — zentraler Orchestrator im Tailscale-Mesh"

# Rolle → physischer Knoten (kanonisch)
role_assignments:
  mainframe:
    node_id: mainframe
    role: orchestrator
    hostname: desktop-kpki9e4
    magicdns: device.example.ts.net
    platform: windows
    tailscale_tag: tag:fusion-node-mainframe
    canonical: true
    aliases: [desktop]
    services:
      - fusion-dashboard
      - hero-docs-server
      - normalos-bridge
      - tailscale-control
      - fusion-integration-hub
      - grok-cli
      - mcp-bridges
      - ollama

  workstation:
    node_id: desktop
    role: grok-workstation
    same_as: mainframe
    hostname: desktop-kpki9e4
    magicdns: device.example.ts.net
    platform: windows
    tailscale_tag: tag:fusion-node-desktop

  mobile:
    node_id: phone
    role: mobile-client
    hostname: redmi-note-13-pro-5g
    hostname_aliases: [phone-node, redmi-note-13-pro-5g, redmi]
    magicdns: redmi-note-13-pro-5g.tail391adb.ts.net
    platform: android
    tailscale_tag: tag:fusion-node-phone
    login_required: user@example.com
    login_warning: "Nicht GitHub — gleicher Login wie Desktop (Google)"
    file_mirror_client: true

  legacy:
    node_id: legacy-linux
    role: archived
    hostname: mainframe
    magicdns: mainframe-host.example.ts.net
    platform: linux
    status: offline
    tailscale_status: "offline >2d — nicht mehr im aktiven Mesh"
    note: "Frueherer Linux-Knoten — Mainframe-Rolle auf Windows-Desktop uebertragen (2026-07-12)"
    action: none

  wsl:
    node_id: wsl-ubuntu
    role: dev-leaf
    platform: linux
    hostname: desktop-kpki9e4-wsl
    magicdns: desktop-kpki9e4-wsl.tail391adb.ts.net
    tailscale_ip: 100.125.58.100
    status: online
    tailscale_tag: tag:fusion-node-wsl
    setup_script: workstation/tailscale_wsl_setup.sh
    mesh_setup_script: workstation/mainframe_mesh_setup.sh
    virtual_exit_default: wsl-dev
    note: "WSL dev leaf — fractal replica target; optional EU egress via cloud-eu profile"

# Speicher — Google Drive als Standard fuer nicht-operative Daten
storage:
  policy_id: google_drive_cold_default
  policy_file: workstation/storage_policy.json
  cold_default: google_drive
  local_operational_only: true
  gdrive_cold_root: "Meine Ablage/FusionHero_Offload"
  vault_provenance: 95guknow/fusion-hero-vault
  apply_script: workstation/apply-storage-policy.ps1

# Git - bifurzierter Bottom-Up-Merge (WSL -> Windows -> GitHub)
git:
  merge_policy: bottom_up
  bottom_up_script: workstation/merge-bottom-up.ps1
  wsl_script: workstation/merge-bottom-up.sh
  status_file: "~/.fusion/merge-bottom-up.status.json"

# Routing (Funnel + MagicDNS) — zeigt auf Windows-Mainframe
routing:
  base_url: https://desktop-kpki9e4.tail391adb.ts.net
  mainframe_hostname: desktop-kpki9e4
  funnel_port: 8088

# Mesh file sharing — phone pulls via Tailscale MagicDNS (hero-docs :8088)
file_share:
  enabled: true
  serve_port: 8088
  max_file_bytes: 26214400
  phone_hostname_aliases: [phone-node, redmi-note-13-pro-5g, redmi]
  zones:
    - id: docs
      label: Dokumentation
      path: docs
      max_depth: 3
      max_files: 200
    - id: journal
      label: Journal
      path: journal
      max_depth: 2
      max_files: 100
    - id: journal_tagebuch
      label: Tagebuch
      path: journal/tagebuch
      max_depth: 1
      max_files: 90
      extensions: [".md"]
    - id: archiv
      label: Archiv
      path: archiv
      max_depth: 4
      max_files: 80
      extensions: [".md", ".json", ".sh", ".py"]
      exclude_extensions: [".obf"]
    - id: workstation
      label: Workstation
      path: workstation
      max_depth: 1
      extensions: [".json", ".yaml", ".yml", ".example", ".md", ".sh", ".ps1"]
      max_files: 80
    - id: filedrops_out
      label: Filedrops
      kind: absolute
      path: "~/.fusion/mesh/filedrops/outbound"
      max_depth: 3
      max_files: 150
    - id: mesh_config
      label: Mesh Config
      path: "."
      max_depth: 0
      names:
        - mesh_connectors.yaml
        - fusion_unified.yaml
        - mesh_virtual_exit_nodes.yaml
        - src/normal_os/integration/mesh_roles.yaml
  phone_urls:
    portal: /mesh/files/phone
    manifest: /mesh/files/manifest
    status: /mesh/files/status
    drop: /mesh/files/drop
  sync_script: workstation/mesh_phone_mirror.sh

# Filedrops: Android <-> Mainframe <-> Google Drive
filedrop_sync:
  enabled: true
  local_roots:
    inbound: "~/.fusion/mesh/filedrops/inbound"
    outbound: "~/.fusion/mesh/filedrops/outbound"
  repo_drops:
    - journal/inbox
    - workstation/inbox_export
  gdrive_subpaths:
    mirror: mesh/mirror
    filedrops: mesh/filedrops
    archives: mesh/archives
  journal_ingest_on_sync: true
  android_subdir: android

# Fractal mainframe persistence on the mesh
fractal_persistence:
  enabled: true
  module: fractal_mainframe_mesh.py
  storage_root: "~/.fusion/mesh/fractal"
  setup_windows: workstation/mainframe_mesh_setup.ps1
  setup_wsl: workstation/mainframe_mesh_setup.sh
  levels:
    L0: anchor          # MasterSeed + config fingerprints
    L1: node            # per physical node slice
    L2: segment         # per connector/agent slice
    L3: exit_profile    # virtual exit routing slice
  replicate_via: hero-docs-server:8088/mesh/fractal/replica

# Virtual exit node routing (logical profiles → physical Tailscale exits)
virtual_exit_nodes:
  config: mesh_virtual_exit_nodes.yaml
  default_profile: direct
  mainframe_elevated: google-server

# Cloud persistence (Supabase + Google Drive + Google GCE server)
cloud_backends:
  module: mesh_cloud_backends.py
  setup_script: workstation/mainframe_mesh_cloud_setup.ps1
  supabase:
    project_ref: swmmoxhdzarmoupyssqe
    schema_v5: 03_Code/Dashboard/supabase/schema_migration_v5_fractal_mesh.sql
    env_file: 03_Code/Dashboard/.env
  google_drive:
    cold_path: FusionHero_Offload/mesh/fractal
  google_server:
    hostname: cs-724978827604-default
    tailscale_ip: 100.127.145.106
    pending_queue: ~/.fusion/mesh/fractal/pending_google_server.json
