mesh_version: '1.2'
tailnet: example.ts.net
updated: '2026-07-15'
live_inventory: false
# Dissertation-as-OS: mesh registry is an organ of the dissertation
# (OS = work; text = one expression). docs/dissertation/ONTOLOGIE_DISSERTATION_IST_DAS_OS.md
ontology: dissertation_as_os
principle: Jeder Konnektor = ein einzelnes Teil des Mesh (eigene ID, Host, Health, Tag)
# Layer-Omega-Direktive 2026-07-15 §5: Node-Typ fuer bifurkale Co-Evolution
node_types:
  hyper4d-coevo:
    description: Hyper4D Co-Evolution Node (bifurkale Synchronisation)
    tailscale_tag: tag:fusion-hyper4d-node
    status_path: /mesh/hyper4d/status
    capabilities:
    - hyper4d_coevolution
    - layer_omega_fixedpoint
    - autopoietic_morphing
    - bifurcal_sync
    registry_cli:
    - python tailscale_mesh_registry.py hyper4d-register
    - python tailscale_mesh_registry.py hyper4d-sync
nodes:
  mainframe:
    role: orchestrator
    hostname: mainframe
    magicdns: mainframe.example.ts.net
    platform: windows
    status: configured
    aliases:
    - desktop
    tailscale_tag: tag:fusion-node-mainframe
    services:
    - fusion-dashboard
    - hero-docs-server
    - tailscale-control
    - grok-cli
    - mcp-bridges
  desktop:
    role: grok-workstation
    same_as: mainframe
    hostname: mainframe
    magicdns: mainframe.example.ts.net
    platform: windows
    status: configured
    tailscale_tag: tag:fusion-node-desktop
    services:
    - grok-cli
    - mcp-bridges
    enduser:
      peer_of: phone
      security_layer: enabled
      active_protocol: classic-enduser-only
      elevated_protocols_enabled: false
      elevated_protocols:
      - orchestrator-access
      - connector-admin
      note: 'Erweiterte Protokolle erst nach bewusster Freischaltung durch den Owner.

        '
  phone:
    role: mobile-client
    hostname: phone
    hostname_aliases:
    - phone-node
    magicdns: phone.example.ts.net
    platform: android
    status: configured
    tailscale_tag: tag:fusion-node-phone
    services:
    - tailscale-app
    - phone-link-bridge
    - mesh-files-portal
    enduser:
      peer_of: desktop
      security_layer: standard
      active_protocol: classic-enduser-only
  mesh-exit:
    role: mesh-exit
    hostname: mesh-exit
    magicdns: mesh-exit.example.ts.net
    platform: linux
    status: configured
    tailscale_tag: tag:fusion-node-exit
  wsl:
    role: dev-leaf
    hostname: mainframe-wsl
    magicdns: mainframe-wsl.example.ts.net
    platform: linux
    status: optional
    tailscale_tag: tag:fusion-node-wsl
agents:
  researcher:
    mesh_id: mesh-agent-researcher
    role: research
    runs_on: mainframe
    health_path: /mesh/agent/researcher/status
    tailscale_tag: tag:fusion-agent-researcher
    capabilities:
    - literatur-recherche
    - quellen-erhebung
    - evidenz-auswertung
    description: Researcher — Mesh-Instanz fuer Recherche/Evidenz
connectors:
  github:
    mesh_id: mesh-connector-github
    type: mcp
    host_node: desktop
    health_path: /mesh/github/status
    tailscale_tag: tag:fusion-connector-github
