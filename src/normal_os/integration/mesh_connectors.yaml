routing:
  # Grok interconnect control plane (canonical re-routes)
  control_plane: /mainframe/grok
  interconnect: /api/grok/interconnect
  grok_route: /api/grok/route
  grok_routes_table: /api/grok/routes
  grok_chat: /api/grok/chat
  grok_status: /api/grok/status
  ai_inhouse_status: /api/ai/inhouse/status
  ai_inhouse_chat: /api/ai/inhouse/chat
  creative_inhouse_status: /api/creative/inhouse/status
  creative_inhouse_create: /api/creative/inhouse/create
  openai_compatible: /v1/chat/completions
  openai_images: /v1/images/generations
  mainframe_hub: /mainframe
  dauer_vr: /mainframe/vr
  ide: /mainframe/ide
  worktree: /mainframe/worktree
  ops: /mainframe/ops
  legacy_redirects:
    /grok: /mainframe/grok
    /ide: /mainframe/ide
    /worktree: /mainframe/worktree
    /portal: /mainframe
    /interconnect: /mainframe/grok
    /vr/persistent: /mainframe/vr
    /api/interconnect: /api/grok/interconnect
  base_url: https://mainframe.example.ts.net
  unified: /fusion/status
  fusion_graph: /fusion/graph
  mesh_overview: /mesh/status
  fractal_status: /mesh/fractal/status
  fractal_replica: /mesh/fractal/replica
  exit_nodes: /mesh/exit-nodes
  per_connector: /mesh/{connector_id}/status
  per_agent: /mesh/agent/{agent_id}/status
  enduser_overview: /mesh/enduser/status
  llm_overview: /llm/status
  per_llm: /llm/{provider}/status
  tailscale_overview: /tailscale/status
fractal_mesh:
  module: fractal_mainframe_mesh.py
  exit_config: mesh_virtual_exit_nodes.yaml
  storage: ~/.fusion/mesh/fractal/manifest.json
integration_hub: fusion_integration_hub.py
unified_config: fusion_unified.yaml
platform_version: 10.0.0
