<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Local Infrastructure Kernel | Fusion Hero OS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/static/style.css">
  <style> @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap'); </style>
</head>
<body class="bg-[#0a0a0f] text-[#e2e8f0]">
  <div class="dashboard-shell">
    <header class="hud-panel dashboard-header m-4 p-4">
      <div class="dashboard-header-brand">
        <div class="w-10 h-10 rounded-full bg-gradient-to-br from-[#00d4aa] to-[#f59e0b] flex items-center justify-center text-black font-bold text-xl shrink-0">LK</div>
        <div>
          <h1 class="text-xl sm:text-2xl font-bold tracking-[2px] sm:tracking-[3px]">LOCAL INFRASTRUCTURE KERNEL</h1>
          <p class="text-xs text-[#94a3b8] header-subline">RAM · Disk C: · Tailscale · Dashboard/Docs/Bridge — ok / warn / alert / critical</p>
        </div>
      </div>
      <div class="dashboard-header-meta">
        <label class="text-xs text-[#94a3b8] flex items-center gap-1">
          <input type="checkbox" id="rg-apply-actions"> Aktionen ausführen
        </label>
        <button id="rg-cycle-btn" class="watch-btn watch-btn-primary">Zyklus jetzt</button>
        <a href="/" class="watch-header-btn" title="Zurueck zum Dashboard">← DASHBOARD</a>
      </div>
    </header>

    <div class="hud-panel m-4 p-3">
      <div id="rg-status-banner" class="text-xs text-[#94a3b8]">lade Status...</div>
    </div>

    <div id="rg-grid" class="dashboard-grid">

      <div class="hud-panel" data-panel-id="escalation">
        <h2 class="text-[#f59e0b] text-sm mb-2 tracking-widest">ESKALATIONSSTUFE</h2>
        <div id="rg-level" class="text-3xl font-bold">--</div>
        <div id="rg-actions" class="text-xs text-[#94a3b8] mt-1">Aktionen: --</div>
      </div>

      <div class="hud-panel" data-panel-id="substrate">
        <h2 class="text-[#00d4aa] text-sm mb-2 tracking-widest">SUBSTRAT</h2>
        <div id="rg-substrate-out" class="text-xs text-[#94a3b8] whitespace-pre-wrap">--</div>
      </div>

      <div class="hud-panel" data-panel-id="services">
        <h2 class="text-[#c084fc] text-sm mb-2 tracking-widest">SERVICES</h2>
        <div id="rg-services-out" class="text-xs text-[#94a3b8] whitespace-pre-wrap">--</div>
      </div>

      <div class="hud-panel" data-panel-id="findings" style="grid-column: span 2;">
        <h2 class="text-[#f59e0b] text-sm mb-2 tracking-widest">FINDINGS (Schwellenwert-Auswertung)</h2>
        <div id="rg-findings-out" class="text-xs text-[#94a3b8] whitespace-pre-wrap max-h-48 overflow-y-auto">--</div>
      </div>

      <div class="hud-panel" data-panel-id="thresholds">
        <h2 class="text-[#00d4aa] text-sm mb-2 tracking-widest">SCHWELLENWERTE</h2>
        <div id="rg-thresholds-out" class="text-xs text-[#94a3b8] whitespace-pre-wrap max-h-48 overflow-y-auto">--</div>
      </div>

    </div>
  </div>

  <script src="/static/resources.js"></script>
</body>
</html>
