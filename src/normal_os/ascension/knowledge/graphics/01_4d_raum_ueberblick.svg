<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="520" height="340" viewBox="0 0 520 340">
  <rect width="100%" height="100%" fill="#FDFAF5"/>
  <text x="260" y="28" text-anchor="middle" font-family="Georgia, Times, serif" font-size="14" font-weight="bold" fill="#1E3A5F">Der vierdimensionale MER-Ursachenraum Z = (K, G, S, N)</text>

  <g transform="translate(260,175)">
    <!-- Achsen K/G/S/N als Tetraeder-Projektion (schematisch) -->
    <line x1="0" y1="80" x2="0" y2="-90" stroke="#1E3A5F" stroke-width="2" marker-end="url(#arr)"/>
    <text x="8" y="-95" font-family="Georgia" font-size="11" fill="#1E3A5F">K Körper</text>
    <line x1="-100" y1="40" x2="110" y2="-30" stroke="#C9A227" stroke-width="2" marker-end="url(#arr)"/>
    <text x="115" y="-35" font-family="Georgia" font-size="11" fill="#C9A227">G Geist</text>
    <line x1="-90" y1="-50" x2="95" y2="55" stroke="#555555" stroke-width="2" marker-end="url(#arr)"/>
    <text x="100" y="65" font-family="Georgia" font-size="11" fill="#555555">S Seele</text>
    <line x1="70" y1="-70" x2="-75" y2="60" stroke="#7D6B8A" stroke-width="2" marker-end="url(#arr)"/>
    <text x="-95" y="75" font-family="Georgia" font-size="11" fill="#7D6B8A">N Natur</text>
    <circle cx="0" cy="0" r="8" fill="#C9A227" stroke="#1E3A5F" stroke-width="1.5"/>
    <text x="14" y="5" font-family="Georgia" font-size="10" font-weight="bold" fill="#C9A227">Z* (0,0,0,0)</text>
    <circle cx="-35" cy="25" r="6" fill="#1E3A5F"/>
    <text x="-75" y="30" font-family="Georgia" font-size="9" fill="#1E3A5F">Z_real</text>
    <circle cx="25" cy="-20" r="6" fill="none" stroke="#8B4513" stroke-width="2"/>
    <text x="35" y="-18" font-family="Georgia" font-size="9" fill="#8B4513">Z_wahrgen.</text>
    <line x1="-35" y1="25" x2="25" y2="-20" stroke="#8B4513" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr)"/>
    <text x="0" y="55" text-anchor="middle" font-family="Georgia" font-size="9" fill="#555555">Δ = Z_wahr − Z_real · I(Z)=Σ|Δ|</text>
  </g>
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#1E3A5F"/>
    </marker>
  </defs>
  <text x="260" y="310" text-anchor="middle" font-family="Georgia" font-size="10" fill="#1C2526">
    d(Z,Z*) = |K|+|G|+|S|+|N| · Attraktor der Rekonstruktion (Bedingt)
  </text>
  <text x="12" y="332" font-family="Georgia, serif" font-size="8" fill="#555555">MER 4D-Matrix · Modell · kein DSM-Ersatz · Kompendium-Duktus</text>
</svg>