[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "fusion-hero-os"
version = "9.1.0"
description = "Fusion Hero OS → AscensionOS — Heroic Core with Inside-Out Generational Evolution"
readme = "README.md"
requires-python = ">=3.10"

# Lean Core Dependencies (always required)
dependencies = [
    "numpy>=1.24",
    "numba>=0.59",
    "psutil>=5.9",
]

[project.optional-dependencies]
# LLM Providers (Claude, Grok, EveryAPI)
llm = [
    "anthropic>=0.40",
    "openai>=1.30",
    "python-dotenv>=1.0",
    "requests>=2.31",
]

# Dashboard / NiceGUI UI
dashboard = [
    "nicegui>=3.0",
    "fastapi>=0.110",
    "uvicorn>=0.27",
    "qrcode[pil]>=7.4",
    "supabase>=2.0",
]

# Evolution & Self-Modification (Generational Engine, SelfModify)
evolution = [
    "numba>=0.59",  # already in core, listed for clarity
]

# Rust Backend (high-performance QUBO solver)
rust = [
    # maturin + rust_engine_crate must be built separately
]

# Full AscensionOS experience
full = [
    "fusion-hero-os[llm,dashboard,evolution]",
]

# Development tools
dev = [
    "pytest>=7.4",
    "ruff>=0.4",
    "httpx>=0.27",
    "mypy>=1.10",
]

[tool.setuptools.packages.find]
include = ["fusion_hero_os*", "ascension_os*"]

[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = ["tests"]
addopts = "-q"

[tool.ruff]
target-version = "py311"
line-length = 120
