    <circle cx="50" cy="-45" r="7" fill="none" stroke="#8B4513" stroke-width="2.5"/>
    <text x="65" y="-42" font-family="Georgia" font-size="10" fill="#8B4513">○ Z_wahrgen. („fett")</text>
    <line x1="-40" y1="35" x2="50" y2="-45" stroke="#8B4513" stroke-width="2" marker-end="url(#arr2)"/>
    <text x="5" y="-5" font-family="Georgia" font-size="9" font-weight="bold" fill="#8B4513">Δ · I(Z) hoch</text>
    <rect x="-170" y="75" width="340" height="45" fill="white" stroke="#C9A227" stroke-width="0.5" rx="4"/>
    <text x="0" y="95" text-anchor="middle" font-family="Georgia" font-size="9" fill="#1C2526">Masking: ● nahe Z*, ○ tief → hohes I bei moderatem d</text>
    <text x="0" y="110" text-anchor="middle" font-family="Georgia" font-size="9" fill="#555555">Rekonstruktivismus (D4): α₂ kalibriert Δ Schicht für Schicht</text>
