    <circle cx="0" cy="0" r="6" fill="#C9A227"/>
    <text x="12" y="4" font-family="Georgia" font-size="9" fill="#C9A227">Z*</text>
    <circle cx="-40" cy="35" r="7" fill="#1E3A5F"/>
