name: Fusion Hero OS - Intelligent CI (Hyperthreading + Smart Routing)

on:
  push:
    branches:
      - main
      - develop
      - ascension
      - 'feature/**'
      - 'heroic/**'
  pull_request:
    branches:
      - main
      - develop
      - ascension

jobs:
  branch-routing-decision:
    runs-on: ubuntu-latest
    name: Branch Routing Decision
    outputs:
      target_track: ${{ steps.decide.outputs.track }}
      recommended_action: ${{ steps.decide.outputs.action }}

    steps:
      - name: Decide best path (Hyperthreading)
        id: decide
        run: |
          BRANCH="${{ github.ref_name }}"
          EVENT="${{ github.event_name }}"

          if [[ "$BRANCH" == "main" ]]; then
            echo "track=main"
            echo "action=direct_push_detected - prefer PR from develop or ascension"
            echo "::warning::Direct push to main detected. Best practice: Use PR from develop (Option A) or ascension (Option B)"
          elif [[ "$BRANCH" == "develop" ]]; then
            echo "track=option_a_develop"
            echo "action=run_full_ci_then_create_pr_to_main"
          elif [[ "$BRANCH" == "ascension" ]]; then
            echo "track=option_b_ascension"
            echo "action=run_full_ci_then_create_pr_to_main_or_keep_isolated"
          else
            echo "track=feature"
            echo "action=run_ci_then_merge_to_develop_or_ascension"
          fi

          echo "track=$track" >> $GITHUB_OUTPUT
          echo "action=$action" >> $GITHUB_OUTPUT

  heroic-core-ci:
    runs-on: ubuntu-latest
    name: Heroic Core Validation (${{ needs.branch-routing-decision.outputs.target_track }})
    needs: branch-routing-decision

    steps:
      - uses: actions/checkout@v4

      - name: Smart Branch Context
        run: |
          echo "=== Hyperthreading CI Decision ==="
          echo "Source Branch: ${{ github.ref_name }}"
          echo "Track: ${{ needs.branch-routing-decision.outputs.target_track }}"
          echo "Recommended Action: ${{ needs.branch-routing-decision.outputs.recommended_action }}"
          echo "=================================="

      - name: Validate Core Structure
        run: |
          echo "Validating fusion_hero_os/core and ascension_os structure..."
          if [ ! -d "fusion_hero_os/core" ]; then
            echo "::error::fusion_hero_os/core/ missing!"
            exit 1
          fi
          echo "Core structure OK"

      - name: Python Syntax Check (both tracks)
        run: |
          echo "Checking Python syntax across fusion_hero_os/ and ascension_os/ ..."
          find fusion_hero_os ascension_os -name "*.py" -print0 2>/dev/null | while IFS= read -r -d '' file; do
            python3 -m py_compile "$file" || exit 1
          done
          echo "All Python files have valid syntax"

      - name: Track-specific Validation
        run: |
          TRACK="${{ needs.branch-routing-decision.outputs.target_track }}"
          if [[ "$TRACK" == "option_b_ascension" ]]; then
            echo "Running AscensionOS strong track specific checks..."
            # Hier können später strengere Ascension-spezifische Checks kommen
          else
            echo "Running standard Heroic Core checks (Option A track)"
          fi

      - name: Final Routing Recommendation
        run: |
          echo "===================================="
          echo "CI COMPLETE - Recommended Next Step:"
          echo "${{ needs.branch-routing-decision.outputs.recommended_action }}"
          echo "===================================="

  # Optional: Block direct pushes to main (can be enabled via branch protection too)
  main-protection:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Warn on direct main push
        run: |
          echo "::warning::Direct push to main is discouraged."
          echo "Best path: Create PR from develop (Option A) or ascension (Option B)."
          # Uncomment the next line to actually fail direct pushes
          # exit 1
