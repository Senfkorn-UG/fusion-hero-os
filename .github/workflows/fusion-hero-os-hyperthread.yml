name: Fusion Hero OS - Heroic Core CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  heroic-core-ci:
    runs-on: ubuntu-latest
    name: Heroic Core Validation

    steps:
      - uses: actions/checkout@v4

      - name: Validate Repository Structure
        run: |
          echo "=== Checking Core vs Developer Separation ==="
          if [ ! -d "core" ]; then
            echo "::error::core/ directory is missing!"
            exit 1
          fi
          if [ ! -d "developer" ]; then
            echo "::warning::developer/ directory not found (may be intentional)"
          fi
          echo "Structure OK"

      - name: Validate Core Python Syntax
        run: |
          echo "=== Validating Python files in core/ ==="
          find core -name "*.py" -print0 | while IFS= read -r -d '' file; do
            echo "Checking: $file"
            python3 -m py_compile "$file" || exit 1
          done
          echo "All core Python files have valid syntax"

      - name: Check Required Core Files
        run: |
          echo "=== Checking required core files ==="
          REQUIRED_FILES=(
            "core/cec.py"
            "core/psycholysis_trigger.py"
            "core/rhe.py"
          )
          for file in "${REQUIRED_FILES[@]}"; do
            if [ ! -f "$file" ]; then
              echo "::error::Required file missing: $file"
              exit 1
            fi
          done
          echo "All required core files present"

      - name: Heroic Core Status Report
        run: |
          echo "===================================="
          echo "ALTE_Frau_95g Heroic Core CI - SUCCESS"
          echo "Version: v7.12"
          echo "Core Structure: Validated"
          echo "Python Syntax: OK"
          echo "===================================="