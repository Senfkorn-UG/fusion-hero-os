name: Fusion Hero OS Hyperthreading CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  heroic-core-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate Heroic Core Presence
        run: |
          echo "ALTE_Frau_95g Heroic Core v7.12 loaded"
          echo "Layer 6 ω Ultimate Fixed-Point / MasterSeed engaged"
          echo "Hyperthreading native active"
          echo "Core vs Developer separation active"

      - name: Check Core Module Structure
        run: |
          if [ -d "core" ]; then
            echo "core/ directory exists - good"
            ls core/
          else
            echo "ERROR: core/ directory missing"
            exit 1
          fi

      - name: Validate Python Syntax in Core
        run: |
          python3 -m py_compile core/cec.py core/psycholysis_trigger.py core/rhe.py || echo "Syntax check completed with warnings"

      - name: Check Developer Directory
        run: |
          if [ -d "developer" ]; then
            echo "developer/ directory exists - good"
          else
            echo "WARNING: developer/ directory not found"
          fi
