name: Fusion Hero OS CI (consolidated v8)

# Konsolidiert aus 4 zuvor parallel existierenden, ueberlappenden Workflows
# (ci.yml, fusion-hero-os-ci-v8.yml, Fusion-Hero-OS_CI_v8_FUsion_branch_resolved.yml,
# fusion-hero-os-hyperthread.yml) - siehe Issue #26. `ci.yml` war der einzige mit
# echten Regression-Gates (pytest, Proof-Registry, Erkenntnis-Index,
# Dependency-Atlas, Doc-Versions); die anderen drei waren Teilmengen oder
# reine Platzhalter-Echos und wurden entfernt statt dupliziert.

on:
  push:
    branches: [ main, develop, ascension, v2-beta, 'feature/**', 'v8/**', 'heroic/**' ]
  pull_request:
    branches: [ main, develop, ascension, v2-beta, 'v8/**' ]

jobs:
  determine-matrix:
    runs-on: ubuntu-latest
    outputs:
      check-level: ${{ steps.set-level.outputs.level }}
      python-versions: ${{ steps.set-python.outputs.versions }}
    steps:
      - name: Set check level
        id: set-level
        run: |
          if [[ "${{ github.ref_name }}" == "main" || "${{ github.ref_name }}" == "develop" || "${{ github.ref_name }}" == "ascension" ]]; then
            echo 'level=full' >> $GITHUB_OUTPUT
          else
            echo 'level=light' >> $GITHUB_OUTPUT
          fi

      - name: Set Python versions
        id: set-python
        run: |
          if [[ "${{ steps.set-level.outputs.level }}" == "full" ]]; then
            echo 'versions=["3.11", "3.12"]' >> $GITHUB_OUTPUT
          else
            echo 'versions=["3.11"]' >> $GITHUB_OUTPUT
          fi

  ci:
    needs: determine-matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ${{ fromJSON(needs.determine-matrix.outputs.python-versions) }}
        check-level: [ "${{ needs.determine-matrix.outputs.check-level }}" ]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"

    - name: Set up Rust
      if: matrix.check-level == 'full'
      uses: dtolnay/rust-toolchain@stable

    - name: Cargo build workspace
      if: matrix.check-level == 'full'
      run: cargo build --workspace

    - name: Lint with Ruff
      run: |
        ruff check fusion_hero_os/ 03_Code/reference/rest_api_server.py || true

    - name: Import-Check (light + full)
      run: |
        python -c "import fusion_hero_os; print('fusion_hero_os OK')"
        python -c "from fusion_hero_os.core import heroic_math_engine; print('heroic_math_engine OK')" || true

    - name: Run Heroic Math Engine Verification
      if: matrix.check-level == 'full'
      run: |
        python -m fusion_hero_os.core.heroic_math_engine

    - name: AscensionOS Track Structure (soft check, non-blocking)
      run: |
        if [ -d "ascension_os" ]; then
          echo "ascension_os/ gefunden."
          if [ ! -f "ascension_os/core/ascension_core.py" ]; then
            echo "::warning::ascension_os/core/ascension_core.py fehlt noch."
          fi
        else
          echo "::warning::ascension_os/ nicht vorhanden (nur relevant auf 'ascension'-Track)."
        fi

    - name: Module Registry Status
      run: |
        python -m fusion_hero_os.registry

    - name: Run root pytest suite
      if: matrix.check-level == 'full'
      run: |
        pytest tests/ -v

    - name: Proof-Registry Gate (Claims <-> Beweise)
      # Kein BEWIESEN-Claim ohne existierenden Test-Knoten. Auf 'full' deckt die
      # pytest-Suite die Ausfuehrung bereits ab (nur Strukturpruefung); auf
      # 'light' fuehrt --run die Beweis-Knoten zusaetzlich aus.
      run: |
        if [[ "${{ matrix.check-level }}" == "full" ]]; then
          python scripts/check_proof_registry.py
        else
          python scripts/check_proof_registry.py --run
        fi

    - name: Erkenntnis-Index Gate (Docs <-> Layer)
      run: |
        python scripts/check_erkenntnisse_index.py

    - name: Dependency-Atlas Gate (Imports <-> Layer)
      run: |
        python -m fusion_hero_os.core.dependency_atlas --check

    - name: Multimodal-Protokoll Gate (Archiv-Inventar)
      run: |
        pip install pypdf Pillow
        python -m fusion_hero_os.core.multimodal_protocol --check

    - name: Doc-Versions Gate (versionierte Benennung)
      run: |
        python scripts/check_doc_versions.py

    - name: Status Report
      run: |
        echo "Branch: ${{ github.ref_name }} | Python: ${{ matrix.python-version }} | Level: ${{ matrix.check-level }} | SHA: ${{ github.sha }}"
