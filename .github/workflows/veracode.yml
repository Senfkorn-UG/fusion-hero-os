# Veracode Static Analysis Pipeline Scan
# Fixed & hardened version (2026-06-29)

name: Veracode Static Analysis Pipeline Scan

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    - cron: "21 15 * * 0"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  build-and-pipeline-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Prepare scan target
        run: |
          zip -r veracode-scan-target.zip ./ --exclude ".git/*" ".github/*"

      - name: Download Veracode Pipeline Scanner
        run: |
          curl --silent --show-error --fail -O https://downloads.veracode.com/securityscan/pipeline-scan-LATEST.zip
          unzip -o pipeline-scan-LATEST.zip

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: "8"
          distribution: "temurin"

      - name: Run Veracode Pipeline Scan
        id: veracode-scan
        continue-on-error: true
        run: |
          java -jar pipeline-scan.jar \
            --veracode_api_id "${{ secrets.VERACODE_API_ID }}" \
            --veracode_api_key "${{ secrets.VERACODE_API_KEY }}" \
            --fail_on_severity "Very High, High" \
            --file veracode-scan-target.zip

      - name: Debug - Check for results.json
        if: always()
        run: |
          echo "=== Veracode Pipeline Scan Result Check ==="
          ls -la results.json 2>/dev/null || echo "results.json NOT FOUND"
          find . -name "results.json" -type f 2>/dev/null || true

      - name: Convert pipeline scan output to SARIF
        id: convert
        if: always()
        uses: veracode/veracode-pipeline-scan-results-to-sarif@ff08ae5b45d5384cb4679932f184c013d34da9be
        with:
          pipeline-results-json: results.json

      - name: Upload SARIF to GitHub
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: veracode-results.sarif
