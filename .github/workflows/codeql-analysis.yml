name: "CodeQL Advanced Security Shield"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '30 2 * * 1' # Wöchentlicher Tiefenscan (Montag 02:30)

concurrency:
  group: "codeql-${{ github.ref }}"
  cancel-in-progress: true # Effizienz-Update integriert

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: python
            build-mode: none

    steps:
      - name: Checkout Repository (MasterSeed)
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Initialize CodeQL (Heroic Core Scan)
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          queries: security-extended,security-and-quality

      - name: Perform CodeQL Analysis (EfficiencyDistillation)
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"