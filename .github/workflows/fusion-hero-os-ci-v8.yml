name: Fusion-Hero-OS CI v8

on:
  push:
    branches:
      - main
      - develop
      - 'feature/**'
  pull_request:
    branches:
      - main
      - develop

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install numpy ruff

    - name: Lint with Ruff (v8 scope)
      run: |
        ruff check core/ 03_Code/reference/rest_api_server.py

    - name: Run Heroic Math Engine Verification
      run: |
        python -m core.heroic_math_engine

    - name: Check import of core modules
      run: |
        python -c "import core; print('Core modules importable')"

    - name: Branch-aware status
      run: |
        echo "CI running on branch: ${{ github.ref_name }}"
        if [[ "${{ github.ref_name }}" == "main" ]]; then
          echo "Full production checks on stable main"
        elif [[ "${{ github.ref_name }}" == "develop" ]]; then
          echo "Full integration checks on develop"
        else
          echo "Feature branch checks (lighter)"
        fi