name: Fusion-Hero-OS CI v8

on:
  push:
    branches:
      - main
      - develop
      - 'feature/**'
  pull_request:
    branches:
      - main
      - develop

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install numpy ruff

    - name: Determine check level
      id: level
      run: |
        if [[ "${{ github.ref_name }}" == "main" || "${{ github.ref_name }}" == "develop" ]]; then
          echo "level=full" >> $GITHUB_OUTPUT
        else
          echo "level=light" >> $GITHUB_OUTPUT
        fi

    - name: Lint with Ruff (always)
      run: |
        ruff check core/ 03_Code/reference/rest_api_server.py || true

    - name: Full checks (main + develop only)
      if: steps.level.outputs.level == 'full'
      run: |
        python -m core.heroic_math_engine || true
        python -c "import core; print('Core modules importable')" || true

    - name: Branch-aware status
      run: |
        echo "CI running on branch: ${{ github.ref_name }} (level: ${{ steps.level.outputs.level }})"