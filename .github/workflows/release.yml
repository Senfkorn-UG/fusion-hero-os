name: Release Fusion Hero OS

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'   # z.B. v1.0.0, v2.3.1

permissions:
  contents: write
  discussions: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Wichtig für Changelog-Generierung

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build Documentation
        run: |
          pip install mkdocs-material mkdocs-awesome-pages-plugin
          mkdocs build --clean

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          draft: false
          prerelease: false
          files: |
            site/**